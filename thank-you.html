<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sauntera — Thank You</title>
  <style>
    :root { --fg:#0f172a; --muted:#475569; --brand:#0ea5e9; --bg:#ffffff; --card:#f8fafc; }
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,Apple Color Emoji,Segoe UI Emoji;color:var(--fg);background:var(--bg);line-height:1.6}
    .page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
    h1{font-size:clamp(28px,4vw,42px);margin:0 0 12px}
    p{font-size:18px;color:var(--muted);max-width:480px;margin:0 0 24px}
    .home-link{
      display:inline-block;padding:12px 32px;background:var(--brand);color:#fff;
      border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;
      transition:background .2s
    }
    .home-link:hover{background:#0284c7}
  </style>
</head>
<body>
  <div class="page">
    <h1>Thank you for contacting us!</h1>
    <p>We've received your message and will get back to you as soon as possible.</p>
    <a href="index.html" class="home-link">Back to Home</a>
  </div>
</body>
</html>
